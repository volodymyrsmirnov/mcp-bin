name: Release

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine next version
        id: bump
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
          if [ -z "$latest" ]; then
            echo "tag=v0.1.0" >> "$GITHUB_OUTPUT"
          else
            patch=$(echo "$latest" | cut -d. -f3)
            prefix=$(echo "$latest" | cut -d. -f1-2)
            echo "tag=${prefix}.$((patch + 1))" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: version
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: linux
            goarch: arm64
            suffix: linux-arm64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
          - goos: windows
            goarch: amd64
            suffix: windows-amd64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          CGO_ENABLED: "0"
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          VERSION="${{ needs.version.outputs.tag }}"
          COMMIT="$(git rev-parse --short HEAD)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w"
          LDFLAGS="$LDFLAGS -X github.com/volodymyrsmirnov/mcp-bin/internal/version.Version=$VERSION"
          LDFLAGS="$LDFLAGS -X github.com/volodymyrsmirnov/mcp-bin/internal/version.Commit=$COMMIT"
          LDFLAGS="$LDFLAGS -X github.com/volodymyrsmirnov/mcp-bin/internal/version.Date=$DATE"
          go build -ldflags="$LDFLAGS" -o mcp-bin-${{ matrix.suffix }} ./cmd/mcp-bin/

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-bin-${{ matrix.suffix }}
          path: mcp-bin-${{ matrix.suffix }}

  universal:
    needs: build
    runs-on: macos-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: mcp-bin-darwin-amd64

      - uses: actions/download-artifact@v4
        with:
          name: mcp-bin-darwin-arm64

      - name: Create universal binary
        run: |
          chmod +x mcp-bin-darwin-amd64 mcp-bin-darwin-arm64
          lipo -create -output mcp-bin-osx-universal mcp-bin-darwin-amd64 mcp-bin-darwin-arm64

      - uses: actions/upload-artifact@v4
        with:
          name: mcp-bin-osx-universal
          path: mcp-bin-osx-universal

  release:
    needs: [version, build, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          rm -f artifacts/mcp-bin-darwin-amd64 artifacts/mcp-bin-darwin-arm64
          gh release create "${{ needs.version.outputs.tag }}" \
            --title "${{ needs.version.outputs.tag }}" \
            --generate-notes \
            artifacts/*

  homebrew:
    needs: [version, build, universal]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Update Homebrew formulae
        env:
          VERSION: ${{ needs.version.outputs.tag }}
        run: |
          SHA_OSX=$(sha256sum artifacts/mcp-bin-osx-universal | cut -d' ' -f1)
          SHA_LINUX_AMD64=$(sha256sum artifacts/mcp-bin-linux-amd64 | cut -d' ' -f1)
          SHA_LINUX_ARM64=$(sha256sum artifacts/mcp-bin-linux-arm64 | cut -d' ' -f1)
          REPO="https://github.com/volodymyrsmirnov/mcp-bin/releases/download/${VERSION}"
          SEMVER="${VERSION#v}"

          # Versioned class name: 0.1.5 -> McpBinAT015
          CLASS_SUFFIX=$(echo "$SEMVER" | tr -d '.')
          VERSIONED_CLASS="McpBinAT${CLASS_SUFFIX}"

          mkdir -p Formula

          generate_formula() {
            local class_name="$1"
            local file="$2"
            cat > "$file" << FORMULA
          class ${class_name} < Formula
            desc "Turn MCP server tools into CLI commands"
            homepage "https://github.com/volodymyrsmirnov/mcp-bin"
            version "${SEMVER}"
            license "MIT"

            on_macos do
              url "${REPO}/mcp-bin-osx-universal"
              sha256 "${SHA_OSX}"
            end

            on_linux do
              on_arm do
                url "${REPO}/mcp-bin-linux-arm64"
                sha256 "${SHA_LINUX_ARM64}"
              end
              on_intel do
                url "${REPO}/mcp-bin-linux-amd64"
                sha256 "${SHA_LINUX_AMD64}"
              end
            end

            def install
              binary = Dir["mcp-bin-*"].first
              bin.install binary => "mcp-bin"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/mcp-bin --version")
            end
          end
          FORMULA
            sed -i 's/^          //' "$file"
          }

          generate_formula "McpBin" "Formula/mcp-bin.rb"
          generate_formula "$VERSIONED_CLASS" "Formula/mcp-bin@${SEMVER}.rb"

      - name: Commit formulae
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/
          git diff --cached --quiet && exit 0
          git commit -m "homebrew: mcp-bin ${{ needs.version.outputs.tag }}"
          git push
